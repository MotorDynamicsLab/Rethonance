# This file contains pin mappings for the LDO Rethonance Hub

# See http://docs.ldomotors.com/toolboard/rethonance#firmware-setup-and-update
# For instructions on uploading/updating klipper firmware to the onboard mcu

# Klipper make menuconfig options:
# Processor model: STM32G0B1
# Bootloader offset (for Katapult): 8KiB bootloader
# Clock Reference: 12Mhz crystal
# Communication interface: USB (on PA11/PA12)

[mcu rth]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial:/dev/serial/by-path/usb-Klipper_STM32_E012345678900000-if00
restart_method: command
##--------------------------------------------------------------------
